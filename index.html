<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Senai - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="login-container">
        <div class="login-box">
            <h2 class="logo">📚 SENAI Conect</h2>
            <p class="subtitle">Faça login para aprender e colaborar.</p>
            
            <form id="loginForm">
                <div class="input-group"><!--campo do primeiro inputs-->
                    <input type="email" id="email" class="input1"    placeholder="E-mail corporativo (ex: aluno@senai.br)">
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input2" placeholder="Senha">
                </div>
                
                <div id="error-message" class="error-message"></div>
                
                <button type="submit" class="login-btn">Entrar</button>  
            
            </form>
                 <h3 class="cadastrar"><a href="cadastrar.html">Cadastre-se</a></h3>
        
        
        </div>
    </div>

   <script  src="login.js"></script>
    <script src="conf/firebase.js"></script>
</body>
</html>
