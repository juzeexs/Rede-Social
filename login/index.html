<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI Connect - Login</title>
    <link rel="stylesheet" href="/login/login.css">
</head>
<body>
    
    <div class="login-container">
        <div class="login-box">
            <h2 class="logo">📚 SENAI Connect</h2>
            <p class="subtitle">Faça login para aprender e colaborar.</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" class="input1" placeholder="E-mail corporativo (ex: @aluno.senai.br)">
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input2" placeholder="Senha">
                </div>
                
                <div id="error-message" class="error-message" style="color: red; margin-bottom: 10px; font-size: 14px;"></div>
                
                <button type="submit" class="login-btn">Entrar</button>  
            </form>

            <h3 class="cadastrar"><a href="/cadastrar/cadastrar.html">Cadastre-se</a></h3>
        </div>
    </div>

    <!-- CORREÇÃO: apenas UM script com type="module" -->
    <script type="module" src="/login/login.js"></script>
</body>
</html>
