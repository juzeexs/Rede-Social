<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Senai - Cadastro</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    
    <div class="login-container">
        <div class="login-box">
            <h2 class="logo">📚 SENAI Conect</h2>
            <p class="subtitle">Crie sua conta para colaborar.</p>
            
            <form id="cadastroForm">
                <div class="input-group">
                    <input type="text" id="nome" class="input1" placeholder="Seu Nome Completo" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" class="input1" placeholder="E-mail corporativo (ex: aluno@senai.br)" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input2" placeholder="Crie uma senha (mín 6 caracteres)" required>
                </div>
                
                <div id="error-message" class="error-message" style="color: red; margin-bottom: 10px; font-size: 14px;"></div>
                
                <button type="submit" class="login-btn">Cadastrar</button>  
            </form>
            
            <h3 class="cadastrar"><a href="index.html">Voltar ao Login</a></h3>
        </div>
    </div>

    <!-- CORREÇÃO: apenas UM script com type="module" -->
    <script type="module" src="cadastrar.js"></script>
</body>
</html>
