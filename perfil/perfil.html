<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - SENAI Connect</title>
    <link rel="stylesheet" href="perfil.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="rede.html" class="logo">📚 SENAI Connect</a>
            
            <div style="font-size: 1.2rem; cursor: pointer;">
                <a href="rede.html" style="text-decoration: none;">🏠</a> 
            </div>
        </div>
    </header>

    <main class="profile-main">
        <header class="profile-header">
           <div class="profile-avatar-container" style="position: relative; cursor: pointer;" title="Clique para trocar a foto" onclick="document.getElementById('input-foto-perfil').click()">
                <img id="foto-perfil-atual" src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=150&q=80" alt="Sua Foto" class="profile-avatar-large">
                
                <input type="file" id="input-foto-perfil" accept="image/*" style="display: none;">
                
                <div style="position: absolute; bottom: 0; background: rgba(0,0,0,0.6); color: white; width: 150px; text-align: center; border-bottom-left-radius: 75px; border-bottom-right-radius: 75px; padding: 5px 0 10px 0; font-size: 12px;">
                    Mudar Foto
                </div>
            </div>
            <div class="profile-info">
                <div class="profile-title-row">
                    <h2 id="perfil-nome" class="profile-username">Carregando...</h2>
                    <button class="edit-profile-btn">Editar perfil</button>
                </div>
                
                <ul class="profile-stats">
                    <li><strong>6</strong> publicações</li>
                    <li><strong>142</strong> seguidores</li>
                    <li><strong>85</strong> seguindo</li>
                </ul>
                
                <div class="profile-bio">
                    <p id="perfil-email">carregando@aluno.senai.br</p>
                    <p>🎓 Estudante do SENAI<br>💻 Apaixonado por tecnologia e programação.<br>🚀 Construindo projetos incríveis!</p>
                </div>
            </div>
        </header>

        <div class="profile-tabs">
            <div class="tab active">▦ PUBLICAÇÕES</div>
            <div class="tab">🔖 SALVOS</div>
        </div>

        <section class="photo-grid">
            <div class="grid-item"><img src="img/info-tbr-linguagens-de-programacao-1060x596.webp" alt="Post 1" class="img1"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1531482615713-2afd69097998?w=300&q=80" alt="Post 2"  class="img2" ></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1606326608606-aa0b62935f2b?w=300&q=80" alt="Post 3"  class="img3"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1516259762381-22954d7d3ad2?w=300&q=80" alt="Post 4" class="img4"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=300&q=80" alt="Post 5" class="img5" ></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=300&q=80" alt="Post 6" class="img6" ></div>
        </section>
    </main>

<div id="image-modal" class="image-modal" onclick="fecharModalImagem(event)">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="img-ampliada" alt="Imagem ampliada">
    </div>




    <script src="perfil.js"></script>
</body>
</html>
